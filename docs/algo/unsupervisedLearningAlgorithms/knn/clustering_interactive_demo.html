<style>
  .ctrl{display:flex;gap:8px;margin-bottom:8px;align-items:center}
  .lbl{font-size:12px;color:var(--color-text-secondary);min-width:76px;flex-shrink:0}
  .btn{padding:4px 14px;border-radius:20px;border:1px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;font-size:12px;transition:all .15s}
  .btn.on{background:var(--color-background-info);border-color:var(--color-border-info);color:var(--color-text-info);font-weight:500}
  .btn:hover:not(.on){background:var(--color-background-tertiary)}
</style>
<div style="padding:10px 0">
  <div class="ctrl">
    <span class="lbl">Données</span>
    <button class="btn on" id="d0" onclick="_sd(0)">Blobs</button>
    <button class="btn"    id="d1" onclick="_sd(1)">Deux lunes</button>
    <button class="btn"    id="d2" onclick="_sd(2)">Anneaux</button>
  </div>
  <div class="ctrl">
    <span class="lbl">Algorithme</span>
    <button class="btn on" id="a0" onclick="_sa(0)">K-means</button>
    <button class="btn"    id="a1" onclick="_sa(1)">DBSCAN</button>
    <button class="btn"    id="a2" onclick="_sa(2)">Hiérarchique</button>
  </div>
  <canvas id="cv" width="640" height="260" style="width:100%;border-radius:8px;border:1px solid var(--color-border-tertiary);display:block;margin:10px 0"></canvas>
  <div id="msg" style="font-size:12px;color:var(--color-text-secondary);line-height:1.7;padding:8px 12px;background:var(--color-background-secondary);border-radius:8px;border:1px solid var(--color-border-tertiary)"></div>
  <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--color-text-tertiary)">
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#378ADD;display:inline-block"></span>Cluster A</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#1D9E75;display:inline-block"></span>Cluster B</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#D85A30;display:inline-block"></span>Cluster C</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#B4B2A9;display:inline-block"></span>Bruit (DBSCAN)</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="font-weight:700;color:#555">+</span> Centroïde (K-means)</span>
  </div>
</div>
<script>
(function(){
const CLR=['#378ADD','#1D9E75','#D85A30','#7F77DD'];
const NOISE='#B4B2A9';
function rng(s){let v=s>>>0;return()=>{v=(Math.imul(v,1664525)+1013904223)>>>0;return v/4294967296}}
function d2(a,b){return(a.x-b.x)**2+(a.y-b.y)**2}

function makeBlobs(){
  const r=rng(42),pts=[];
  for(const[cx,cy] of [[135,95],[510,95],[325,195]])
    for(let i=0;i<33;i++){const a=r()*6.28,d=r()**0.5*50;pts.push({x:cx+Math.cos(a)*d,y:cy+Math.sin(a)*d})}
  return pts;
}
function makeMoons(){
  const r=rng(17),pts=[];
  for(let i=0;i<50;i++){const t=r()*Math.PI;pts.push({x:215+Math.cos(t)*135+(r()-.5)*18,y:100+Math.sin(t)*85+(r()-.5)*15})}
  for(let i=0;i<50;i++){const t=r()*Math.PI;pts.push({x:425-Math.cos(t)*135+(r()-.5)*18,y:165-Math.sin(t)*85+(r()-.5)*15})}
  return pts;
}
function makeRings(){
  const r=rng(33),pts=[];
  for(let i=0;i<35;i++){const a=r()*6.28,rad=55+(r()-.5)*10;pts.push({x:320+Math.cos(a)*rad,y:130+Math.sin(a)*rad})}
  for(let i=0;i<55;i++){const a=r()*6.28,rad=115+(r()-.5)*10;pts.push({x:320+Math.cos(a)*rad,y:130+Math.sin(a)*rad})}
  return pts;
}

function kmeans(pts,k,maxIter=80){
  const r=rng(99);
  const C=[{...pts[0]}];
  while(C.length<k){
    const ds=pts.map(p=>Math.min(...C.map(c=>d2(p,c))));
    const s=ds.reduce((a,b)=>a+b,0);let rv=r()*s,ac=0;
    for(let i=0;i<pts.length;i++){ac+=ds[i];if(ac>=rv){C.push({...pts[i]});break}}
  }
  const L=new Array(pts.length).fill(0);
  for(let it=0;it<maxIter;it++){
    let ch=false;
    pts.forEach((p,i)=>{let b=0,bd=Infinity;C.forEach((c,ci)=>{const dd=d2(p,c);if(dd<bd){bd=dd;b=ci}});if(L[i]!==b){L[i]=b;ch=true}});
    if(!ch)break;
    const S=C.map(()=>({x:0,y:0,n:0}));
    pts.forEach((p,i)=>{S[L[i]].x+=p.x;S[L[i]].y+=p.y;S[L[i]].n++});
    C.forEach((c,i)=>{if(S[i].n){c.x=S[i].x/S[i].n;c.y=S[i].y/S[i].n}});
  }
  return{labels:L,cents:C};
}

function dbscan(pts,eps,minPts){
  const n=pts.length,L=new Array(n).fill(-1),e2=eps*eps;
  const nb=i=>{const a=[];for(let j=0;j<n;j++)if(d2(pts[i],pts[j])<=e2)a.push(j);return a};
  let cl=0;
  for(let i=0;i<n;i++){
    if(L[i]!==-1)continue;
    const ni=nb(i);
    if(ni.length<minPts){L[i]=-2;continue}
    L[i]=cl;const q=[...ni],seen=new Set(ni);
    while(q.length){
      const p=q.shift();
      if(L[p]===-2)L[p]=cl;
      if(L[p]!==-1)continue;
      L[p]=cl;
      const np=nb(p);
      if(np.length>=minPts)for(const x of np)if(!seen.has(x)){seen.add(x);q.push(x)}
    }
    cl++;
  }
  return L;
}

function ward(pts,k){
  const n=pts.length;
  let cls=pts.map((_,i)=>[i]);
  const cen=c=>{let sx=0,sy=0;c.forEach(i=>{sx+=pts[i].x;sy+=pts[i].y});return{x:sx/c.length,y:sy/c.length}};
  while(cls.length>k){
    let bi=0,bj=1,bd=Infinity;
    for(let i=0;i<cls.length;i++)for(let j=i+1;j<cls.length;j++){
      const delta=cls[i].length*cls[j].length/(cls[i].length+cls[j].length)*d2(cen(cls[i]),cen(cls[j]));
      if(delta<bd){bd=delta;bi=i;bj=j}
    }
    const m=[...cls[bi],...cls[bj]];
    cls=cls.filter((_,i)=>i!==bi&&i!==bj);cls.push(m);
  }
  const L=new Array(n).fill(0);
  cls.forEach((c,idx)=>c.forEach(i=>L[i]=idx));
  return L;
}

const DESCS=[
  ["K-means retrouve parfaitement les 3 blobs convexes et isotropes (J = Σ‖xᵢ−μₖ‖² minimisé). C'est le cas idéal : clusters sphériques, bien séparés, de taille comparable.",
   "DBSCAN (ε=45, minPts=4) détecte 3 régions denses sans aucun bruit parasite. Résultat identique à K-means — les deux approches convergent sur des données favorables.",
   "La méthode de Ward (variance intra-cluster minimale) regroupe correctement les 3 nuages compacts. Dendrogramme coupé à k=3 niveaux au-dessus des feuilles."],
  ["K-means échoue : la frontière de Voronoï (linéaire dans l'espace des features) ne peut pas suivre des frontières concaves. Les deux croissants sont découpés verticalement.",
   "DBSCAN (ε=22, minPts=4) suit la densité locale et retrouve les deux formes en C, quelle que soit leur courbure. Zéro hypothèse sur la forme des clusters.",
   "Ward échoue également : minimiser la variance intra-cluster implique le même biais de convexité que K-means. Single linkage réussirait, au prix d'un effet chaîne sur données bruitées."],
  ["K-means (k=2) partitionne les anneaux en demi-disques — frontière de décision verticale. Incapable de séparer des structures concentriques de même centroïde.",
   "DBSCAN (ε=20, minPts=4) sépare les deux densités annulaires avec précision : la connectivité par densité capture la topologie circulaire.",
   "Ward échoue sur les anneaux : même centroïde, variance intra similaire — aucun critère de variance ne distingue deux cercles concentriques. Le clustering spectral est la solution naturelle."]
];

const DP=[[45,4],[22,4],[20,4]],K=[3,2,2];
const DS=[makeBlobs(),makeMoons(),makeRings()];
const cache={};

function res(di,ai){
  const k=`${di}_${ai}`;
  if(!cache[k]){
    if(ai===0)cache[k]=kmeans(DS[di],K[di]);
    else if(ai===1)cache[k]={labels:dbscan(DS[di],...DP[di])};
    else cache[k]={labels:ward(DS[di],K[di])};
  }
  return cache[k];
}

let cD=0,cA=0;
function draw(){
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  ctx.clearRect(0,0,640,260);
  const pts=DS[cD],r=res(cD,cA),L=r.labels;
  pts.forEach((p,i)=>{
    const noise=L[i]===-2;
    ctx.beginPath();ctx.arc(p.x,p.y,4.5,0,6.28);
    ctx.fillStyle=noise?NOISE:CLR[L[i]%CLR.length];
    ctx.globalAlpha=noise?0.3:0.78;ctx.fill();
    ctx.globalAlpha=1;
    ctx.strokeStyle=noise?NOISE:CLR[L[i]%CLR.length];
    ctx.lineWidth=0.7;ctx.stroke();
  });
  if(cA===0&&r.cents){
    r.cents.forEach((c,i)=>{
      ctx.strokeStyle=CLR[i%CLR.length];ctx.lineWidth=2.5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(c.x-10,c.y);ctx.lineTo(c.x+10,c.y);ctx.stroke();
      ctx.beginPath();ctx.moveTo(c.x,c.y-10);ctx.lineTo(c.x,c.y+10);ctx.stroke();
    });
  }
  document.getElementById('msg').textContent=DESCS[cD][cA];
}
window._sd=i=>{cD=i;['d0','d1','d2'].forEach((id,j)=>document.getElementById(id).classList.toggle('on',j===i));draw()};
window._sa=i=>{cA=i;['a0','a1','a2'].forEach((id,j)=>document.getElementById(id).classList.toggle('on',j===i));draw()};
draw();
})();
</script>
